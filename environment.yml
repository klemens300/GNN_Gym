# Curated environment for GNN training + KMC simulation.
#
#   conda env create -f environment.yml
#   conda activate gnn-kmc
#   pip install -e .
#
# Notes:
#  * PyTorch / PyTorch Geometric must match your CUDA toolkit. The versions
#    below are a known-good combination; adjust the CUDA build for your GPU.
#  * The UMA (FairChem) NEB oracle used to GENERATE training data and the
#    diffusion / elastic-constant calculations are an optional extra and are
#    installed separately (see README, "Generating training data"):
#        pip install fairchem-core matscipy
#  * environment.lock.yml is the exact, fully pinned export of the machine the
#    paper results were produced on (less portable, use only for bit-for-bit
#    reproduction).
name: gnn-kmc
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  # Scientific core
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - tqdm
  # Atomistic structures / materials
  - ase=3.25
  - pymatgen
  - spglib
  - pip:
      # Deep learning stack (pick the CUDA build matching your system)
      - torch>=2.8
      - torch-geometric>=2.6
      # Experiment tracking (optional but used by the training loop)
      - wandb
